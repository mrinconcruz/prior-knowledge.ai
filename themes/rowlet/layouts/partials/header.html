<header id="header">
    <h1 id="header-text">
        <a href="/">{{ .Site.Title }}</a>
    </h1>
    <p id="header-subtitle">{{ .Site.Params.subtitle }}</p>
    <button id="hamburger-btn" onclick="document.getElementById('topnav').classList.toggle('open')" aria-label="Toggle menu">
        ☰ Menu
    </button>
    <nav id="topnav">
        <ul>
            {{ range (where .Site.RegularPages "Params.series" true).ByParam "series_order" }}
            <li>
                <a class="{{ if eq $.RelPermalink .RelPermalink }}active{{ end }}" href="{{ .RelPermalink }}">{{ .Title }}</a>
            </li>
            {{ end }}
        </ul>
    </nav>
</header>
