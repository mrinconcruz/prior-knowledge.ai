<header id="header">
    <h1 id="header-text">
        <a href="/">{{ .Site.Title }}</a>
    </h1>
    <nav id="topnav">
        <ul>
            {{ range (where .Site.RegularPages "Params.series" true).ByParam "series_order" }}
            <li>
                <a class="{{ if eq $.RelPermalink .RelPermalink }}active{{ end }}" href="{{ .RelPermalink }}">{{ .Title }}</a>
            </li>
            {{ end }}
        </ul>
    </nav>
</header>
