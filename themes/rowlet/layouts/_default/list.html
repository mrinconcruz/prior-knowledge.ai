{{ define "main" }}
<main id="list-main">
    <article>
        <header>
            <h1>{{ .Title }}</h1>
        </header>
        {{ .Content }}
        <ul>
            {{ range .Pages }}
                {{if not .Params.hidden }}
                <li>
                    <a href="{{.Permalink}}">{{.Title}}</a>
                </li>
                {{ end }}
            {{ end }}
        </ul>
    </article>
</main>

{{ end }}
