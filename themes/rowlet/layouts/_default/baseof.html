<!DOCTYPE html>
<html lang="en">
{{- partial "head.html" . -}}

<body>
    <div id="body-container">
        {{- partial "header.html" . -}}
        <div id="content">
            {{- block "main" . }}{{- end }}
        </div>
        {{ if or (not .Params.series) (not .IsPage) }}
            {{- partial "mailchimp.html" . -}}
        {{ end }}
        {{- partial "footer.html" . -}}
    </div>
</body>
</html>
