<!DOCTYPE html>
<html>
{{- partial "head.html" . -}}

<body>
    <div id="body-container">
        {{- partial "header.html" . -}}
        <div id="content">
            {{- block "main" . }}{{- end }}
        </div>
        {{ if or (ne .Type "essays") (not .IsPage) }}
            {{- partial "mailchimp.html" . -}}
        {{ end }}
        {{- partial "footer.html" . -}}
    </div>

</body>

</html>
